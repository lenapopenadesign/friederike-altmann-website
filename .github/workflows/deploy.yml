name: Build and Deploy to Hetzner Webhosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (with Tina schema)
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npm run build:with-tina

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" sftp://$FTP_HOST:22;
            mirror -R --verbose --parallel=4 \
              --exclude-glob .git/ \
              --exclude-glob node_modules/ \
              --exclude-glob .DS_Store \
              ./_site/ $FTP_REMOTE_DIR;
            bye;
          "
