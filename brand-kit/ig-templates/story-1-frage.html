<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>STORY · Frage — Friederike Altmann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --tinte:#3A3142; --safran:#E8A33D; --nacht:#5F4F75;
    --flieder100:#EEE9F1; --flieder50:#F9F7FA;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background:#222; font-family:'Manrope', sans-serif; }
  body { display:flex; justify-content:center; padding:32px; }
  .canvas {
    width:1080px; height:1920px;
    background:var(--flieder100); color:var(--tinte);
    position:relative; overflow:hidden;
    border-radius:8px;
  }
  /* Safe-zone hints (subtle dashed lines) */
  .safe-top, .safe-bottom {
    position:absolute; left:0; right:0; height:240px;
    border-bottom:1px dashed rgba(58,49,66,0.12);
    color:rgba(58,49,66,0.4);
    font-size:14px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px;
  }
  .safe-top { top:0; }
  .safe-bottom {
    bottom:0; height:380px;
    border-bottom:none; border-top:1px dashed rgba(58,49,66,0.12);
    align-items:flex-start; padding-top:8px;
  }
  /* Signet */
  .signet {
    position:absolute; top:280px; left:80px;
    font-weight:800; font-size:80px; line-height:1; letter-spacing:-4px;
  }
  .signet .f { color:var(--tinte); }
  .signet .a { color:var(--safran); }
  .eyebrow {
    position:absolute; top:400px; left:80px;
    font-size:32px; font-weight:700; letter-spacing:7px;
    color:var(--nacht); text-transform:uppercase;
  }
  .headline {
    position:absolute; left:80px; right:80px; top:500px;
    font-size:116px; font-weight:800; letter-spacing:-5px;
    line-height:1; color:var(--tinte);
  }
  .headline em {
    font-style:italic; font-weight:800; color:var(--safran);
  }
  .sub {
    position:absolute; left:80px; right:80px; top:1180px;
    font-size:36px; font-weight:400; line-height:1.5; color:var(--tinte);
  }
  .sticker-box {
    position:absolute; left:80px; right:80px; top:1350px;
    height:180px;
    border:3px dashed var(--safran); border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:700; color:var(--safran);
    letter-spacing:3px;
  }
  .footer {
    position:absolute; left:80px; bottom:380px;
    font-size:28px; font-weight:700; letter-spacing:7px;
    color:var(--nacht); text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="safe-top">IG Safe-Zone (Status-Bar)</div>
    <div class="signet"><span class="f">F</span><span class="a">A</span></div>
    <div class="eyebrow">Story-Frage</div>
    <div class="headline">Was hast du deiner Resilienz heute <em>geschenkt</em>?</div>
    <div class="sub">Ein Wort, ein Satz, eine Geschichte — antworte mit dem Frage-Sticker.</div>
    <div class="sticker-box">→ Frage-Sticker hier platzieren</div>
    <div class="footer">Friederikealtmann.de</div>
    <div class="safe-bottom">IG Safe-Zone (Nachrichten-Bar)</div>
  </div>
</body>
</html>
