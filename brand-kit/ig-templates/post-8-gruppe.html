<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>POST · Gruppe — Friederike Altmann</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --tinte:#3A3142; --safran:#E8A33D; --nacht:#5F4F75;
    --sand:#F1EDE6; --bg:#FCFBFA;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background:#222; font-family:'Manrope', sans-serif; }
  body { display:flex; justify-content:center; padding:32px; }
  .canvas {
    width:1080px; height:1350px;
    background:var(--sand); color:var(--tinte);
    position:relative; overflow:hidden;
    border-radius:8px;
  }
  /* Full-width photo as the top half */
  .photo {
    position:absolute; left:0; right:0; top:0;
    height:760px;
    background-image:url('../../assets/group-table.jpg');
    background-size:cover;
    background-position:center;
  }
  .signet {
    position:absolute; top:80px; left:80px;
    font-weight:800; font-size:80px; line-height:1; letter-spacing:-4px;
    z-index:2;
  }
  .signet .f { color:#F1EDE6; }
  .signet .a { color:var(--safran); }
  /* Text panel */
  .text {
    position:absolute; left:0; right:0; bottom:0;
    height:590px;
    background:var(--sand);
    padding:80px 80px 80px;
  }
  .text .label {
    font-size:30px; font-weight:700; letter-spacing:7px;
    color:var(--nacht); text-transform:uppercase; margin-bottom:28px;
  }
  .text .headline {
    font-size:80px; font-weight:800; letter-spacing:-3px;
    line-height:1.08; color:var(--tinte); margin-bottom:38px;
  }
  .text .headline em { font-style:italic; color:var(--safran); }
  .text .body {
    font-size:30px; font-weight:400; line-height:1.5; color:var(--tinte);
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="photo"></div>
    <div class="signet"><span class="f">F</span><span class="a">A</span></div>
    <div class="text">
      <div class="label">B2C · Gruppen-Coaching</div>
      <div class="headline">Im kleinen Kreis <em>wächst es leichter</em>.</div>
      <div class="body">4–8 Teilnehmer:innen · 6 Termine im Block · Wochentagabende oder Samstage in München.</div>
    </div>
  </div>
</body>
</html>
