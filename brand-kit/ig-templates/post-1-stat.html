<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>POST · Stat-Card — Friederike Altmann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --tinte:#3A3142; --safran:#E8A33D; --nacht:#5F4F75;
    --flieder200:#E3DDEA; --flieder400:#BDB0CC; --bg:#FCFBFA;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background:#222; font-family:'Manrope', sans-serif; }
  body { display:flex; justify-content:center; align-items:flex-start; padding:32px; }
  .canvas {
    width:1080px; height:1350px;
    background:var(--tinte); color:var(--bg);
    position:relative; overflow:hidden;
    border-radius:8px;
  }
  /* SIGNET top-left */
  .signet {
    position:absolute; top:80px; left:80px;
    font-family:'Manrope', sans-serif; font-weight:800;
    font-size:80px; line-height:1; letter-spacing:-4px;
  }
  .signet .f { color:#F1EDE6; }
  .signet .a { color:var(--safran); }
  /* Eyebrow */
  .eyebrow {
    position:absolute; top:210px; left:80px;
    font-size:32px; font-weight:700; letter-spacing:7px;
    color:var(--flieder200); text-transform:uppercase;
  }
  /* Stat block — no vertical rule */
  .stat {
    position:absolute; left:80px; top:430px;
  }
  .stat .num {
    font-size:280px; font-weight:800; color:var(--safran);
    letter-spacing:-12px; line-height:1;
  }
  /* Explainer */
  .explainer {
    position:absolute; left:80px; right:80px; top:820px;
    font-size:44px; font-weight:400; line-height:1.4; color:var(--bg);
    max-width:920px;
  }
  /* Source */
  .source {
    position:absolute; left:80px; bottom:130px;
    font-size:26px; font-weight:700; letter-spacing:6px;
    color:var(--flieder400); text-transform:uppercase;
  }
  /* Footer URL — larger */
  .footer {
    position:absolute; left:80px; bottom:80px;
    font-size:26px; font-weight:700; letter-spacing:7px;
    color:var(--flieder200); text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="signet"><span class="f">F</span><span class="a">A</span></div>
    <div class="eyebrow">Zahlen · Daten · Fakten</div>
    <div class="stat">
      <div class="num">80 %</div>
    </div>
    <div class="explainer">der Arbeitnehmer:innen in Deutschland fühlen sich gestresst.</div>
    <div class="source">Quelle · TK Stressstudie</div>
    <div class="footer">Friederikealtmann.de</div>
  </div>
</body>
</html>
