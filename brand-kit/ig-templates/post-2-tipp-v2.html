<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>POST · Tipp v2 — Friederike Altmann</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,200;0,400;0,700;0,800;1,200;1,700&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --tinte:#3A3142; --safran:#E8A33D; --nacht:#5F4F75;
    --flieder100:#EEE9F1; --cream:#F7F2EA; --bg:#FCFBFA;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background:#222; font-family:'Manrope', sans-serif; }
  body { display:flex; justify-content:center; padding:32px; }
  .canvas {
    width:1080px; height:1350px;
    background:var(--cream); color:var(--tinte);
    position:relative; overflow:hidden;
    border-radius:8px;
  }
  .header {
    position:absolute; top:120px; left:120px; right:120px;
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .no-badge {
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-weight:400;
    font-size:32px; color:var(--nacht);
  }
  .signet {
    font-weight:800; font-size:56px; line-height:1; letter-spacing:-3px;
  }
  .signet .f { color:var(--tinte); }
  .signet .a { color:var(--safran); }
  .eyebrow {
    position:absolute; top:280px; left:120px;
    font-size:24px; font-weight:600; letter-spacing:8px;
    color:var(--nacht); text-transform:uppercase;
  }
  /* Headline — mixed weights for editorial feel */
  .headline {
    position:absolute; left:120px; right:120px; top:390px;
    font-size:96px; font-weight:200;     /* ExtraLight base */
    letter-spacing:-3.5px;
    line-height:1.04; color:var(--tinte);
  }
  .headline .accent {
    font-style:italic; font-weight:700;   /* contrast: bold italic */
    color:var(--safran);
  }
  .headline .strong {
    font-weight:800;                       /* anchor word in ExtraBold */
  }
  /* Sub-line + body */
  .meta {
    position:absolute; left:120px; right:120px; top:840px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-weight:400;
    font-size:36px; color:var(--nacht);
    line-height:1.4;
  }
  .body {
    position:absolute; left:120px; right:380px; top:950px;
    font-size:28px; font-weight:300; line-height:1.55; color:var(--tinte);
  }
  /* Hairline + web at bottom */
  .divider {
    position:absolute; left:120px; right:120px; bottom:160px;
    height:1px; background:rgba(58,49,66,0.18);
  }
  .web {
    position:absolute; right:120px; bottom:90px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-weight:400;
    font-size:28px; color:var(--tinte);
  }
  .web-label {
    position:absolute; left:120px; bottom:90px;
    font-size:20px; font-weight:600; letter-spacing:7px;
    color:var(--nacht); text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="no-badge">Tipp No. 01</div>
      <div class="signet"><span class="f">F</span><span class="a">A</span></div>
    </div>
    <div class="eyebrow">Resilienz · Atmung</div>
    <div class="headline">Atme länger <span class="accent">aus</span>,<br>als du <span class="strong">einatmest</span>.</div>
    <div class="meta">vier ein. sechs aus. drei Atemzüge.</div>
    <div class="body">Aktiviert deinen Parasympathikus — dein Nervensystem schaltet messbar runter. Funktioniert auch im Meeting.</div>
    <div class="divider"></div>
    <div class="web-label">Mini-Tools</div>
    <div class="web">friederikealtmann.de</div>
  </div>
</body>
</html>
