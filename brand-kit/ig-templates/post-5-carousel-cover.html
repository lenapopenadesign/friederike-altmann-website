<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>POST · Carousel Cover — Friederike Altmann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,400;0,700;0,800;1,400;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --tinte:#3A3142; --safran:#E8A33D; --nacht:#5F4F75;
    --flieder200:#E3DDEA; --flieder400:#BDB0CC; --bg:#FCFBFA;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background:#222; font-family:'Manrope', sans-serif; }
  body { display:flex; justify-content:center; padding:32px; }
  .canvas {
    width:1080px; height:1350px;
    background:var(--tinte); color:var(--bg);
    position:relative; overflow:hidden;
    border-radius:8px;
  }
  .signet {
    position:absolute; top:80px; left:80px;
    font-weight:800; font-size:80px; line-height:1; letter-spacing:-4px;
  }
  .signet .f { color:#F1EDE6; }
  .signet .a { color:var(--safran); }
  /* Einzel sketch top-right */
  .sketch {
    position:absolute; top:80px; right:80px;
    width:220px; height:220px;
    color:var(--flieder200); opacity:0.4;
  }
  .sketch svg { width:100%; height:100%; }
  .eyebrow {
    position:absolute; top:300px; left:80px;
    font-size:32px; font-weight:700; letter-spacing:7px;
    color:var(--flieder200); text-transform:uppercase;
  }
  .headline {
    position:absolute; left:80px; right:80px; top:380px;
    font-size:136px; font-weight:800; letter-spacing:-6px;
    line-height:0.96; color:var(--bg);
    max-width:920px;
  }
  .headline em {
    font-style:italic; font-weight:800; color:var(--safran);
  }
  .subline {
    position:absolute; left:80px; right:80px; top:1080px;
    font-size:38px; font-weight:400; font-style:italic; color:var(--flieder200);
    line-height:1.4;
  }
  .footer {
    position:absolute; left:80px; bottom:80px;
    font-size:26px; font-weight:700; letter-spacing:7px;
    color:var(--flieder200); text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="signet"><span class="f">F</span><span class="a">A</span></div>
    <div class="sketch">
      <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 38 16 C 22 22, 14 40, 18 58 C 22 76, 42 86, 60 80 C 80 74, 86 52, 78 34 C 70 16, 52 12, 38 16 Z"/>
        <circle cx="52" cy="48" r="3.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="eyebrow">Tipp · Carousel</div>
    <div class="headline">5 Wege, deine Resilienz zu <em>trainieren</em>.</div>
    <div class="subline">Wische für 5 Mini-Tools für deinen Alltag →</div>
    <div class="footer">Friederikealtmann.de</div>
  </div>
</body>
</html>
